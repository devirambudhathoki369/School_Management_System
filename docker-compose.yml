# Full-stack deployment definition. `docker compose up -d` brings up
# Postgres, Redis, the API (with migrations), a Celery worker and the
# nginx-served frontend on http://localhost:8080.
#
# For day-to-day development the native dev servers remain the fast path
# (see README); `docker compose up -d redis` alone gives dev a real broker.

x-backend-env: &backend-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set in .env}
  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
  DJANGO_SSL_REDIRECT: "false" # terminate TLS at the outer proxy in real deploys
  CSRF_TRUSTED_ORIGINS: "http://localhost:8080"
  CORS_ALLOWED_ORIGINS: "http://localhost:8080"
  DB_NAME: school_erp
  DB_USER: erp
  DB_PASSWORD: ${DB_PASSWORD:-erp}
  DB_HOST: postgres
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp}
      POSTGRES_DB: school_erp
    ports:
      - "5434:5432" # 5433 is the native dev cluster; compose uses 5434
    volumes:
      - pgdata:/var/lib/postgresql # PG18+ images use the parent dir, not /data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d school_erp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment: *backend-env
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 60"
    volumes:
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    environment: *backend-env
    command: celery -A config worker --loglevel INFO --concurrency 4
    volumes:
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
